services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: realestate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb -p local/realestate-media || true;
      /usr/bin/mc anonymous set download local/realestate-media || true;
      /usr/bin/mc policy set public local/realestate-media || true;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # Optional so CI can start infra services without a committed .env
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONPATH: /app/services/api:/app/packages/config
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/realestate
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./services/api:/app/services/api
      - ./packages/config:/app/packages/config
      - ./tests:/app/tests
    # Host 8001 — host port 8000 is often taken by other local apps
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONPATH: /app/services/api:/app/packages/config
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/realestate
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./services/api:/app/services/api
      - ./packages/config:/app/packages/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    command: pnpm dev
    env_file:
      - path: .env
        required: false
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
      API_INTERNAL_URL: http://api:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
