# Production stack for Dream Home Estate
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-realestate}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    # Host port for nginx /media proxy (localhost only via nginx)
    ports:
      - "127.0.0.1:${MINIO_PORT:-9010}:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb -p local/$${S3_BUCKET_NAME:-realestate-media} || true;
      /usr/bin/mc anonymous set download local/$${S3_BUCKET_NAME:-realestate-media} || true;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-realestate-media}
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/services/api:/app/packages/config
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-realestate}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_USE_SSL: "false"
    # Host-only port so nginx can proxy /api without going through Next rewrites
    ports:
      - "127.0.0.1:${API_PORT:-8010}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      # Entrypoint waits for DB + runs alembic before uvicorn
      start_period: 90s
    networks:
      - internal

  worker:
    build:
      context: .
      dockerfile: services/api/Dockerfile.prod
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/services/api:/app/packages/config
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-realestate}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal

  beat:
    build:
      context: .
      dockerfile: services/api/Dockerfile.prod
    command: celery -A app.worker.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/services/api:/app/packages/config
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-realestate}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        # Baked into next.config rewrites at build time
        API_INTERNAL_URL: http://api:8000
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Browser hits same origin; Next rewrites /api/* → api service
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    ports:
      - "127.0.0.1:${APP_PORT:-3010}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
