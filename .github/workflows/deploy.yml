# Deploy Dream Home Estate as non-root user "madhu" to /opt/dreamhomeestate.
#
# Required GitHub secrets:
#   DEPLOY_HOST     — server IP / hostname
#   DEPLOY_USER     — madhu
#   DEPLOY_SSH_KEY  — private key authorized for madhu
#
# Optional:
#   DEPLOY_PORT     — SSH port (default 22)
#   DEPLOY_PATH     — app dir (default /opt/dreamhomeestate)
#   DEPLOY_SSH_PASSPHRASE

name: Deploy Dream Home Estate

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-dreamhomeestate
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -e
          missing=0
          if [ -z "$DEPLOY_HOST" ]; then
            echo "::error::DEPLOY_HOST is missing."
            missing=1
          fi
          if [ -z "$DEPLOY_USER" ]; then
            echo "::error::DEPLOY_USER is missing. Set to: madhu"
            missing=1
          fi
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::DEPLOY_SSH_KEY is missing (private key for madhu)."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          if ! printf '%s' "$DEPLOY_SSH_KEY" | grep -q "BEGIN.*PRIVATE KEY"; then
            echo "::error::DEPLOY_SSH_KEY must be a private key (BEGIN ... PRIVATE KEY)."
            exit 1
          fi
          if ! printf '%s' "$DEPLOY_SSH_KEY" | grep -q "END.*PRIVATE KEY"; then
            echo "::error::DEPLOY_SSH_KEY missing END line (truncated paste)."
            exit 1
          fi
          echo "Secrets OK. host=${DEPLOY_HOST} user=${DEPLOY_USER}"

      - name: Deploy over SSH as madhu
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          script_stop: true
          command_timeout: 40m
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            if [ -z "${APP_DIR}" ]; then
              APP_DIR=/opt/dreamhomeestate
            fi
            APP_DIR="${APP_DIR%/}"
            DOMAIN=dreamhomeestate.madhudadi.in
            APP_PORT=3010
            MINIO_PORT=9010
            REPO_URL=https://github.com/madhu2456/dreamhomeestate.git
            ME="$(whoami)"

            echo "User=${ME} APP_DIR=${APP_DIR} DOMAIN=${DOMAIN}"

            # Ensure app directory exists and is owned by deploy user
            if [ ! -d "${APP_DIR}" ]; then
              echo "App dir missing — creating ${APP_DIR}..."
              if mkdir -p "${APP_DIR}" 2>/dev/null; then
                :
              elif command -v sudo >/dev/null && sudo -n true 2>/dev/null; then
                sudo mkdir -p "${APP_DIR}"
                sudo chown -R "${ME}:${ME}" "${APP_DIR}"
              else
                echo "ERROR: cannot create ${APP_DIR}."
                echo "SSH as root once and run:"
                echo "  mkdir -p ${APP_DIR} && chown -R ${ME}:${ME} ${APP_DIR}"
                echo "  usermod -aG docker ${ME}"
                exit 1
              fi
            fi

            if command -v sudo >/dev/null && sudo -n true 2>/dev/null; then
              sudo chown -R "${ME}:${ME}" "${APP_DIR}" || true
            fi

            git config --global --add safe.directory "${APP_DIR}" || true

            if [ ! -d "${APP_DIR}/.git" ]; then
              echo "No git checkout — cloning ${REPO_URL}..."
              # Clone into empty/new dir (preserve .env if any)
              if [ -f "${APP_DIR}/.env" ]; then
                cp "${APP_DIR}/.env" /tmp/dhe.env.bak
              fi
              # If dir has leftover files, clone to temp
              if [ -n "$(ls -A "${APP_DIR}" 2>/dev/null | grep -v '^\.env$' || true)" ]; then
                TMP="$(mktemp -d)"
                git clone --branch main "${REPO_URL}" "${TMP}"
                if [ -f /tmp/dhe.env.bak ]; then cp /tmp/dhe.env.bak "${TMP}/.env"; fi
                find "${APP_DIR}" -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf {} +
                # shellcheck disable=SC2086
                cp -a "${TMP}/." "${APP_DIR}/"
                rm -rf "${TMP}"
              else
                rmdir "${APP_DIR}" 2>/dev/null || true
                git clone --branch main "${REPO_URL}" "${APP_DIR}"
                if [ -f /tmp/dhe.env.bak ]; then cp /tmp/dhe.env.bak "${APP_DIR}/.env"; fi
              fi
              rm -f /tmp/dhe.env.bak
            fi

            cd "${APP_DIR}"

            echo "Syncing to origin/main..."
            git remote set-url origin "${REPO_URL}" || true
            git fetch origin
            git checkout main
            git reset --hard origin/main
            git clean -fd -e .env
            chmod +x deploy.sh 2>/dev/null || true

            # Docker group check
            if ! docker info >/dev/null 2>&1; then
              echo "ERROR: cannot talk to Docker as ${ME}."
              echo "As root once: usermod -aG docker ${ME}  # then re-login"
              exit 1
            fi

            export APP_DIR DOMAIN APP_PORT MINIO_PORT REPO_URL
            export BRANCH=main
            export DEPLOY_USER="${ME}"
            ./deploy.sh --update

            echo "Waiting for health on :${APP_PORT}..."
            WEB_OK=0
            for i in $(seq 1 50); do
              # Do not use curl -f here: some pages may return non-2xx briefly
              CODE="$(curl -sS -o /dev/null -w '%{http_code}' "http://127.0.0.1:${APP_PORT}/" 2>/dev/null || echo 000)"
              if [ "${CODE}" = "200" ] || [ "${CODE}" = "301" ] || [ "${CODE}" = "302" ] || [ "${CODE}" = "307" ] || [ "${CODE}" = "308" ]; then
                echo "Web healthy (HTTP ${CODE})."
                WEB_OK=1
                break
              fi
              echo "  wait ${i}/50 web status=${CODE}"
              if [ "$i" -eq 50 ]; then
                echo "Health check timed out:"
                docker compose -f docker-compose.prod.yml ps || true
                docker compose -f docker-compose.prod.yml logs --tail=120 || true
                exit 1
              fi
              sleep 3
            done

            # API is internal; verify via container (rewrite path is best-effort only)
            if docker compose -f docker-compose.prod.yml exec -T api curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/api/v1/health | grep -q 200; then
              echo "API healthy (container)."
            else
              echo "WARNING: API container health check did not return 200"
              docker compose -f docker-compose.prod.yml logs --tail=40 api || true
              # Do not fail the whole deploy if web is up and earlier step already saw API healthy
            fi

            REWRITE_CODE="$(curl -sS -o /dev/null -w '%{http_code}' "http://127.0.0.1:${APP_PORT}/api/v1/health" 2>/dev/null || echo 000)"
            echo "Next /api rewrite status: ${REWRITE_CODE} (informational)"

            if [ "${WEB_OK}" != "1" ]; then
              echo "ERROR: web never became healthy"
              exit 1
            fi

            echo "Deploy complete → https://${DOMAIN}"
            exit 0
